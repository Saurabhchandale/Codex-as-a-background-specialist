<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>api/directory — free public APIs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F2F3EE;
    --surface:#FFFFFF;
    --ink:#14161C;
    --ink-soft:#5B5F6B;
    --ink-faint:#9498A2;
    --line:#DBDDD5;
    --line-soft:#E7E8E2;
    --accent:#2F4CE0;
    --accent-soft:#E9ECFF;
    --good:#1E8E5A;
    --good-soft:#E3F3EA;
    --warn:#A9752B;
    --warn-soft:#F5EEDC;
    --mono:'IBM Plex Mono', ui-monospace, Menlo, monospace;
    --sans:'IBM Plex Sans', -apple-system, sans-serif;
    --radius:3px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;cursor:pointer;}

  /* ---------- Top bar ---------- */
  .topbar{
    position:sticky;
    top:0;
    z-index:50;
    background:var(--bg);
    border-bottom:1px solid var(--line);
  }
  .topbar-inner{
    max-width:1080px;
    margin:0 auto;
    padding:16px 24px;
    display:flex;
    align-items:center;
    gap:20px;
  }
  .wordmark{
    font-family:var(--mono);
    font-weight:600;
    font-size:15px;
    letter-spacing:-0.02em;
    white-space:nowrap;
    display:flex;
    align-items:baseline;
    gap:2px;
  }
  .wordmark .slash{color:var(--accent);}
  .wordmark .count{
    color:var(--ink-faint);
    font-weight:400;
    font-size:11px;
    margin-left:8px;
    display:none;
  }
  @media(min-width:640px){ .wordmark .count{display:inline;} }

  .search-wrap{
    flex:1;
    display:flex;
    align-items:center;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:0 12px;
    height:38px;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .search-wrap:focus-within{
    border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-soft);
  }
  .search-prompt{
    font-family:var(--mono);
    color:var(--accent);
    font-size:14px;
    margin-right:8px;
    user-select:none;
  }
  #search{
    flex:1;
    border:none;
    outline:none;
    background:transparent;
    font-family:var(--mono);
    font-size:14px;
    color:var(--ink);
  }
  #search::placeholder{color:var(--ink-faint);}
  .search-hint{
    font-family:var(--mono);
    font-size:11px;
    color:var(--ink-faint);
    border:1px solid var(--line);
    border-radius:2px;
    padding:2px 5px;
    margin-left:8px;
    display:none;
  }
  @media(min-width:768px){ .search-hint{display:inline-block;} }
  .clear-btn{
    background:none;border:none;color:var(--ink-faint);
    font-size:16px;line-height:1;padding:2px 4px;display:none;
  }
  .clear-btn:hover{color:var(--ink);}

  /* ---------- Main layout ---------- */
  main{
    max-width:1080px;
    margin:0 auto;
    padding:28px 24px 80px;
  }

  .crumbs{
    font-family:var(--mono);
    font-size:12px;
    color:var(--ink-soft);
    margin-bottom:18px;
    display:flex;
    align-items:center;
    gap:6px;
    min-height:18px;
  }
  .crumbs .crumb-link{color:var(--accent);cursor:pointer;}
  .crumbs .crumb-link:hover{text-decoration:underline;}
  .crumbs .sep{color:var(--ink-faint);}
  .crumbs .current{color:var(--ink);}

  .page-title{
    font-family:var(--mono);
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--ink-faint);
    margin:0 0 20px;
  }

  /* ---------- Category grid ---------- */
  .cat-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px,1fr));
    gap:1px;
    background:var(--line);
    border:1px solid var(--line);
  }
  .cat-card{
    background:var(--surface);
    padding:20px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    min-height:104px;
    cursor:pointer;
    transition:background .12s ease;
    position:relative;
  }
  .cat-card:hover{background:var(--accent-soft);}
  .cat-card:hover .cat-name{color:var(--accent);}
  .cat-card:hover .cat-arrow{opacity:1;transform:translateX(0);}
  .cat-name{
    font-size:15px;
    font-weight:600;
    line-height:1.3;
    transition:color .12s ease;
  }
  .cat-meta{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-top:14px;
  }
  .cat-count{
    font-family:var(--mono);
    font-size:22px;
    font-weight:500;
    color:var(--ink);
  }
  .cat-count .label{
    font-size:10px;
    font-family:var(--mono);
    color:var(--ink-faint);
    margin-left:4px;
    font-weight:400;
  }
  .cat-arrow{
    font-family:var(--mono);
    color:var(--accent);
    opacity:0;
    transform:translateX(-4px);
    transition:all .15s ease;
    font-size:14px;
  }

  /* ---------- List / results ---------- */
  .list{
    display:flex;
    flex-direction:column;
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
    background:var(--surface);
  }
  .api-row{
    padding:16px 20px;
    border-bottom:1px solid var(--line-soft);
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .api-row:last-child{border-bottom:none;}
  .api-row:hover{background:#FAFAF8;}

  .api-head{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:12px;
    flex-wrap:wrap;
  }
  .api-name-link{
    font-size:15px;
    font-weight:600;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .api-name-link:hover{color:var(--accent);}
  .api-name-link .ext{
    font-size:11px;
    color:var(--ink-faint);
  }
  .api-cat-tag{
    font-family:var(--mono);
    font-size:11px;
    color:var(--ink-faint);
    background:var(--bg);
    border:1px solid var(--line);
    border-radius:2px;
    padding:2px 6px;
    white-space:nowrap;
    cursor:pointer;
  }
  .api-cat-tag:hover{color:var(--accent);border-color:var(--accent);}

  .api-desc{
    font-size:13.5px;
    color:var(--ink-soft);
    line-height:1.5;
    margin:0;
  }

  .badges{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-top:2px;
  }
  .badge{
    font-family:var(--mono);
    font-size:11px;
    padding:3px 7px;
    border-radius:2px;
    display:inline-flex;
    align-items:center;
    gap:5px;
    border:1px solid transparent;
    line-height:1.4;
  }
  .badge .dot{
    width:6px;height:6px;border-radius:50%;
    display:inline-block;
  }
  .badge-good{background:var(--good-soft);color:var(--good);}
  .badge-good .dot{background:var(--good);}
  .badge-warn{background:var(--warn-soft);color:var(--warn);}
  .badge-warn .dot{background:var(--warn);}
  .badge-neutral{background:var(--bg);color:var(--ink-faint);border-color:var(--line);}
  .badge-neutral .dot{background:var(--ink-faint);}

  .empty-state{
    padding:60px 20px;
    text-align:center;
    color:var(--ink-soft);
  }
  .empty-state .big{
    font-family:var(--mono);
    font-size:14px;
    color:var(--ink);
    margin-bottom:6px;
  }
  .empty-state .small{
    font-size:13px;
    color:var(--ink-faint);
  }

  .results-meta{
    font-family:var(--mono);
    font-size:12px;
    color:var(--ink-faint);
    margin-bottom:12px;
  }

  footer{
    max-width:1080px;
    margin:0 auto;
    padding:0 24px 40px;
    font-family:var(--mono);
    font-size:11px;
    color:var(--ink-faint);
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
  }
  footer a{color:var(--accent);}
  footer a:hover{text-decoration:underline;}

  @media(max-width:600px){
    .topbar-inner{padding:12px 16px;gap:10px;}
    main{padding:20px 16px 60px;}
    .cat-grid{grid-template-columns:1fr 1fr;}
  }

  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
</style>
</head>

,"cors":"Yes"},{"name":"Open-Meteo","link":"https://open-meteo.com/","description":"Global weather forecast API for non-commercial use","auth":"No","https":"Yes","cors":"Yes"},{"name":"openSenseMap","link":"https://api.opensensemap.org/","description":"Data from Personal Weather Stations called senseBoxes","auth":"No","https":"Yes","cors":"Yes"},{"name":"OpenUV","link":"https://www.openuv.io","description":"Real-time UV Index Forecast","auth":"apiKey","https":"Yes","cors":"Unknown"},{"name":"OpenWeatherMap","link":"https://openweathermap.org/api","description":"Weather","auth":"apiKey","https":"Yes","cors":"Unknown"},{"name":"Pirate Weather","link":"https://pirateweather.net/en/latest/","description":"Free weather API with forecast data similar to Dark Sky","auth":"No","https":"Yes","cors":"Yes"},{"name":"QWeather","link":"https://dev.qweather.com/en/","description":"Location-based weather data","auth":"apiKey","https":"Yes","cors":"Yes"},{"name":"Rainbow Weather","link":"https://developer.rainbow.ai/","description":"Global real-time nowcasting API powered by radar + satellite fusion","auth":"apiKey","https":"Yes","cors":"Unknown"},{"name":"RainViewer","link":"https://www.rainviewer.com/api.html","description":"Radar data collected from different websites across the Internet","auth":"No","https":"Yes","cors":"Unknown"},{"name":"Storm Glass","link":"https://stormglass.io/","description":"Global marine weather from multiple sources","auth":"apiKey","https":"Yes","cors":"Yes"},{"name":"Tomorrow","link":"https://docs.tomorrow.io","description":"Weather API Powered by Proprietary Technology","auth":"apiKey","https":"Yes","cors":"Unknown"},{"name":"US Weather","link":"https://www.weather.gov/documentation/services-web-api","description":"US National Weather Service","auth":"No","https":"Yes","cors":"Yes"},{"name":"Visual Crossing","link":"https://www.visualcrossing.com/weather-api","description":"Global historical and weather forecast data","auth":"apiKey","https":"Yes","cors":"Yes"},{"name":"weather-api","link":"https://github.com/robertoduessmann/weather-api","description":"A RESTful free API to check the weather","auth":"No","https":"Yes","cors":"No"},{"name":"WeatherAPI","link":"https://www.weatherapi.com/","description":"Weather API with other stuff like Astronomy and Geolocation API","auth":"apiKey","https":"Yes","cors":"Yes"},{"name":"Weatherbit","link":"https://www.weatherbit.io/api","description":"Weather","auth":"apiKey","https":"Yes","cors":"Unknown"},{"name":"wttr.in","link":"https://wttr.in/:help","description":"Weather in your terminal, supports JSON output","auth":"No","https":"Yes","cors":"Yes"},{"name":"Yandex.Weather","link":"https://yandex.com/dev/weather/","description":"Assesses weather condition in specific locations","auth":"apiKey","https":"Yes","cors":"No"}]}</script>
<script>
(function(){
  const DATA = JSON.parse(document.getElementById('api-data').textContent);
  const categories = Object.keys(DATA).sort((a,b)=>a.localeCompare(b));
  const totalCount = Object.values(DATA).reduce((s,arr)=>s+arr.length,0);

  document.getElementById('header-count').textContent = totalCount.toLocaleString() + ' apis';

  // Flatten for global search
  const ALL = [];
  categories.forEach(cat=>{
    DATA[cat].forEach(api=>{
      ALL.push(Object.assign({}, api, {category: cat}));
    });
  });

  const state = { category: null, query: '' };

  const contentEl = document.getElementById('content');
  const crumbsEl = document.getElementById('crumbs');
  const searchEl = document.getElementById('search');
  const clearBtn = document.getElementById('clear-btn');

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function authBadge(auth){
    if(auth === 'No'){
      return `<span class="badge badge-good"><span class="dot"></span>no auth</span>`;
    }
    return `<span class="badge badge-warn"><span class="dot"></span>${escapeHtml(auth)}</span>`;
  }
  function boolBadge(label, val){
    let cls = 'badge-neutral';
    if(val === 'Yes') cls = 'badge-good';
    else if(val === 'No') cls = 'badge-warn';
    return `<span class="badge ${cls}"><span class="dot"></span>${label}: ${escapeHtml(val).toLowerCase()}</span>`;
  }

  function renderCategoryGrid(){
    crumbsEl.innerHTML = '';
    let html = `<p class="page-title">browse by category</p><div class="cat-grid">`;
    categories.forEach(cat=>{
      const n = DATA[cat].length;
      html += `
        <div class="cat-card" data-cat="${escapeHtml(cat)}" role="button" tabindex="0">
          <div class="cat-name">${escapeHtml(cat)}</div>
          <div class="cat-meta">
            <div class="cat-count">${n}<span class="label">apis</span></div>
            <div class="cat-arrow">view →</div>
          </div>
        </div>`;
    });
    html += `</div>`;
    contentEl.innerHTML = html;
    contentEl.querySelectorAll('.cat-card').forEach(card=>{
      card.addEventListener('click', ()=>{
        state.category = card.getAttribute('data-cat');
        state.query = '';
        searchEl.value = '';
        render();
      });
      card.addEventListener('keydown', e=>{
        if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); card.click(); }
      });
    });
  }

  function renderList(apis, opts){
    opts = opts || {};
    const showCatTag = !!opts.showCatTag;

    let metaHtml = `<div class="results-meta">${apis.length.toLocaleString()} api${apis.length===1?'':'s'}${opts.metaSuffix||''}</div>`;

    if(apis.length === 0){
      contentEl.innerHTML = metaHtml + `
        <div class="list">
          <div class="empty-state">
            <div class="big">no matches</div>
            <div class="small">try a different name or keyword</div>
          </div>
        </div>`;
      return;
    }

    let rows = apis.map(api=>{
      const catTag = showCatTag
        ? `<span class="api-cat-tag" data-cat="${escapeHtml(api.category)}">${escapeHtml(api.category)}</span>`
        : '';
      return `
        <div class="api-row">
          <div class="api-head">
            <a class="api-name-link" href="${escapeHtml(api.link)}" target="_blank" rel="noopener noreferrer">
              ${escapeHtml(api.name)} <span class="ext">↗</span>
            </a>
            ${catTag}
          </div>
          <p class="api-desc">${escapeHtml(api.description)}</p>
          <div class="badges">
            ${authBadge(api.auth)}
            ${boolBadge('https', api.https)}
            ${boolBadge('cors', api.cors)}
          </div>
        </div>`;
    }).join('');

    contentEl.innerHTML = metaHtml + `<div class="list">${rows}</div>`;

    if(showCatTag){
      contentEl.querySelectorAll('.api-cat-tag').forEach(tag=>{
        tag.addEventListener('click', (e)=>{
          e.stopPropagation();
          state.category = tag.getAttribute('data-cat');
          state.query = '';
          searchEl.value = '';
          render();
        });
      });
    }
  }

  function renderCrumbsForCategory(cat){
    crumbsEl.innerHTML = `
      <span class="crumb-link" id="crumb-home">all categories</span>
      <span class="sep">/</span>
      <span class="current">${escapeHtml(cat)}</span>
    `;
    document.getElementById('crumb-home').addEventListener('click', ()=>{
      state.category = null;
      render();
    });
  }

  function renderCrumbsForSearch(query){
    crumbsEl.innerHTML = `
      <span class="crumb-link" id="crumb-home">all categories</span>
      <span class="sep">/</span>
      <span class="current">search: "${escapeHtml(query)}"</span>
    `;
    document.getElementById('crumb-home').addEventListener('click', ()=>{
      state.category = null;
      state.query = '';
      searchEl.value = '';
      render();
    });
  }

  function matchesQuery(api, q){
    q = q.toLowerCase();
    return api.name.toLowerCase().includes(q) ||
           api.description.toLowerCase().includes(q) ||
           api.category.toLowerCase().includes(q);
  }

  function render(){
    const q = state.query.trim();

    if(!q && !state.category){
      renderCategoryGrid();
      return;
    }

    if(q){
      let pool = state.category ? ALL.filter(a=>a.category===state.category) : ALL;
      let matches = pool.filter(a=>matchesQuery(a,q));
      // sort: name-starts-with first
      const ql = q.toLowerCase();
      matches.sort((a,b)=>{
        const an = a.name.toLowerCase().startsWith(ql) ? 0 : 1;
        const bn = b.name.toLowerCase().startsWith(ql) ? 0 : 1;
        if(an !== bn) return an - bn;
        return a.name.localeCompare(b.name);
      });
      if(state.category){
        renderCrumbsForCategory(state.category);
      } else {
        renderCrumbsForSearch(q);
      }
      renderList(matches, {showCatTag: !state.category});
      return;
    }

    // category, no query
    renderCrumbsForCategory(state.category);
    const apis = DATA[state.category].map(a=>Object.assign({}, a, {category: state.category}));
    apis.sort((a,b)=>a.name.localeCompare(b.name));
    renderList(apis, {showCatTag:false});
  }

  let debounceTimer;
  searchEl.addEventListener('input', ()=>{
    clearBtn.style.display = searchEl.value ? 'inline-block' : 'none';
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(()=>{
      state.query = searchEl.value;
      render();
    }, 80);
  });

  clearBtn.addEventListener('click', ()=>{
    searchEl.value = '';
    state.query = '';
    clearBtn.style.display = 'none';
    searchEl.focus();
    render();
  });

  document.addEventListener('keydown', (e)=>{
    if(e.key === '/' && document.activeElement !== searchEl){
      e.preventDefault();
      searchEl.focus();
    }
    if(e.key === 'Escape' && document.activeElement === searchEl){
      searchEl.value = '';
      state.query = '';
      clearBtn.style.display = 'none';
      render();
    }
  });

  render();
})();
</script>
</body>
</html>
